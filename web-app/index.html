<!doctype html>
<html lang="en-gb">
<meta charset="utf-8">
<title>Dobble: Student Edition</title>
<link rel="stylesheet" href="default.css">
<link rel="icon" href="./assets/favicon.png">
<script type="module" src="main.js"></script>

<header>
    <h1><img id="logo" src="./assets/logo.png" alt="Dobble: Student Edition"></h1>
    <a href="/docs/">API Documentation</a>
</header>

<main>
    <div id="scoreboard">
        <div class="score">
            <h2>Player 1</h2>
            <div id="player_1_score">0</div>
        </div>
        <div id="round_panel">
            <div>Round</div>
            <div><span id="round_number">0</span> / <span id="total_rounds">0</span></div>
        </div>
        <div class="score">
            <h2>Player 2</h2>
            <div id="player_2_score">0</div>
        </div>
    </div>

    <div id="cards">
        <section class="player_area" aria-label="Player 1's card">
            <div class="card" id="player_1_card"></div>
        </section>
        <section class="player_area" aria-label="Player 2's card">
            <div class="card" id="player_2_card"></div>
        </section>
    </div>

    <p id="status" role="status" aria-live="polite">Click Start Game to begin.</p>

    <button id="start_button" type="button">Start Game</button>
</main>

<footer>
    <img id="institution_logo" src="./assets/imperial-logo.png" alt="Imperial College London, Dyson School of Design Engineering">
</footer>

<dialog id="result_dialog" aria-label="Game over">
    <h2>Game Over</h2>
    <p id="result_message"></p>
    <button id="play_again_button" type="button">Play Again</button>
</dialog>
